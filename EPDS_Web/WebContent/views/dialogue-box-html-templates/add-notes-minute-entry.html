<style>
    .modal {
        display: block;
    }

    .modal-body:before,
    .modal-body:after {
        display: table;
        content: " ";
    }

    .modal-header:before,
    .modal-header:after {
        display: table;
        content: " ";
    }

    .custom-modal-bg-color {
        background-color: lightgray;
    }
</style>


<div class="modal-content" disableBackBtn>
    <div class="modal-header modal-header-primary">
        <h4 class="modal-title">
            <i class="glyphicon glyphicon-plus-sign"></i> {{headerText}}
            <a data-ng-click="cancel()" class="pull-right" title="Close" alt="Close">
                <i class="glyphicon glyphicon-remove-circle show-pointer"></i>
            </a>
        </h4>
    </div>
    <div class="modal-body custom-modal-bg-color">
        <div>
            <label for="comments">{{headerText}}</label>
            <textarea id="comments" data-ng-trim="true" name="comments" class="form-control"
                      data-ng-pattern="regEx.comments"
                      data-ng-model="comments" char-limit="250"></textarea>
            <span data-ng-class="{'btn-warning': comments.length >= 120, 'btn-danger': comments.length > 250 }">{{ 250 - comments.length }} characters remaining</span>
        </div>
    </div>
    <div>
        <div class="modal-footer custom-modal-bg-color buttoncls">
            <button class="btn btn-success " data-ng-show="type == 'minuteEntry'"
                    data-ng-click="addMinuteEntry(comments)"
                    data-ng-disabled="comments.length < 1 || comments.length > 250">Add
            </button>&nbsp;&nbsp;
            <button class="btn btn-success " data-ng-show="type == 'notes'"
                    data-ng-click="addNotes(comments)"
                    data-ng-disabled="comments.length < 1 || comments.length > 250">Add
            </button>&nbsp;&nbsp;
            <button class="btn btn-danger  pull-right" data-ng-click="cancel()">Cancel</button>
        </div>
    </div>
</div>
