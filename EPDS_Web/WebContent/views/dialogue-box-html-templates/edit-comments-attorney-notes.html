<style>
    .modal {
        display: block;
    }

    .modal-body:before,
    .modal-body:after {
        display: table;
        content: " ";
    }

    .modal-header:before,
    .modal-header:after {
        display: table;
        content: " ";
    }

    .custom-modal-bg-color {
        background-color: lightgray;
    }
</style>
<div class="modal-content" disableBackBtn>
    <div class="modal-header modal-header-primary">
        <h4 class="modal-title">
            <i class="glyphicon glyphicon-thumbs-up"></i>
            <span> {{titleText}}</span>
            <a data-ng-click="cancel()" class="pull-right" title="Close" alt="Close">
                <i class="glyphicon glyphicon-remove-circle show-pointer"></i>
            </a>
        </h4>
    </div>

    <div class="modal-body" style="background-color: lightgray;">
        <div class="form-group">
            <label for="comments" class="col-sm-2 col-md-3 control-label">Comments</label>
            <div class="col-sm-10 col-lg-9 col-md-9">
                                    <textarea id="comments" name="comments" class="form-control"
                                              data-ng-trim="true"
                                              data-ng-pattern="regEx.comments"
                                              title="Enter comments"
                                              data-ng-model="comments" char-limit="251"></textarea>
                <span data-ng-class="{'btn-warning': comments.length >= 120, 'btn-danger': comments.length >= 250 }">{{ 250 - comments.length }} characters remaining</span>
            </div>
        </div>

        <div class="buttoncls">
            <button class="btn btn-success spacing-between-elements" data-ng-click="addNotes(comments)" id="{{$index}} "
                    value="{{$index}}" data-ng-disabled="comments.length < 1 || comments.length >= 250">Edit
            </button>&nbsp;&nbsp;
            <button class="btn btn-danger spacing-between-elements" data-ng-click="cancel()" id="{{$index}}"
                    value="{{$index}}">Cancel
            </button>
        </div>
    </div>
</div><!-- /.modal-content -->
