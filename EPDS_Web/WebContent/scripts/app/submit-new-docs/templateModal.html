<div class="modal-content">
	<div class="modal-header modal-header-primary">
		<h4 class="modal-title">{{title}}</h4>
	</div>
	<div class="modal-body">
		<textarea class="ck-editor" data-ng-model="data"></textarea>
	</div>
	<div class="modal-footer">
		<button class="btn btn-primary" data-ng-click="ok(data)">Save</button>
		<button class="btn btn-warning" data-ng-click="cancel(data)">Cancel</button>
	</div>
</div>
